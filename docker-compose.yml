services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm dev:web
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/api/node_modules
      - /app/apps/mobile/node_modules
      - /app/packages/types/node_modules
      - /app/apps/web/.next
    environment:
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
    env_file:
      - apps/web/.env.local
    networks:
      - default
      - dev-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.waypause.rule=Host(`waypause.localhost`)"
      - "traefik.http.routers.waypause.entrypoints=web"
      - "traefik.http.services.waypause.loadbalancer.server.port=3000"

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm dev:api
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/api/node_modules
      - /app/apps/mobile/node_modules
      - /app/packages/types/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: development
    env_file:
      - apps/api/.env
    networks:
      - default
      - dev-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.waypause-api.rule=Host(`waypause-api.localhost`)"
      - "traefik.http.routers.waypause-api.entrypoints=web"
      - "traefik.http.services.waypause-api.loadbalancer.server.port=4000"

networks:
  dev-proxy:
    external: true
